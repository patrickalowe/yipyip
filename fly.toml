# Fly.io deployment for yipyip (patrickalowe)
# Runs the published mauriceboe/yipyip image with persistent volumes for the
# SQLite database (/app/data) and user uploads (/app/uploads).
app = "yipyip-patricklowe"
primary_region = "sjc"

[build]
  dockerfile = "fly.Dockerfile"

  [build.args]
    # From-source build of this fork, produced by deploy-fly.sh step 1.
    BASE_IMAGE = "registry.fly.io/yipyip-patricklowe:base"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  TZ = "America/Los_Angeles"
  # Behind Fly's proxy: trust 1 hop so HTTPS + client IP are detected correctly,
  # which lets yipyip issue secure session cookies over the fly.dev HTTPS edge.
  TRUST_PROXY = "1"
  APP_URL = "https://yipyip-patricklowe.fly.dev"
  ALLOWED_ORIGINS = "https://yipyip-patricklowe.fly.dev"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "20s"
    method = "GET"
    path = "/api/health"

[mounts]
  source = "yipyip_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
